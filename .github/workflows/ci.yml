name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:                    # reusable by release.yml as a gate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep 'cyrius *= *"' cyrius.cyml 2>/dev/null | head -1 | sed 's/.*"\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/vyk

      - name: Lint
        run: |
          rc=0
          for f in src/*.cyr src/grammars/*.cyr; do
            cyrius lint "$f" || rc=$?
          done
          exit $rc

      - name: Test
        run: cyrius test tests/vyakarana.tcyr

      - name: Smoke test
        run: sh scripts/smoke.sh build/vyk

      # Owl and other downstream consumers pull
      # `[deps.vyakarana] modules = ["dist/vyakarana.cyr"]` at a
      # tag — so the committed bundle must match what `cyrius
      # distlib` produces from the current `[lib]` block. If a dev
      # edited a src/*.cyr without rerunning distlib, fail here.
      - name: distlib drift check
        run: |
          if [ ! -f dist/vyakarana.cyr ]; then
            echo "::error::dist/vyakarana.cyr is missing — run 'cyrius distlib'" >&2
            exit 1
          fi
          cp dist/vyakarana.cyr dist/vyakarana.cyr.committed
          cyrius distlib
          if ! diff -q dist/vyakarana.cyr.committed dist/vyakarana.cyr > /dev/null; then
            echo "::error::dist/vyakarana.cyr is out of date — run 'cyrius distlib' and commit the result" >&2
            diff dist/vyakarana.cyr.committed dist/vyakarana.cyr | head -30 >&2
            exit 1
          fi
          rm dist/vyakarana.cyr.committed
